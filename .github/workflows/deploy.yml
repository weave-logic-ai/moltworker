name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          command: deploy
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          node -e '
            const s = {
              ANTHROPIC_API_KEY: process.env.S_ANTHROPIC_API_KEY,
              MOLTBOT_GATEWAY_TOKEN: process.env.S_MOLTBOT_GATEWAY_TOKEN,
              CF_ACCESS_TEAM_DOMAIN: process.env.S_CF_ACCESS_TEAM_DOMAIN,
              CF_ACCESS_AUD: process.env.S_CF_ACCESS_AUD,
              R2_ACCESS_KEY_ID: process.env.S_R2_ACCESS_KEY_ID,
              R2_SECRET_ACCESS_KEY: process.env.S_R2_SECRET_ACCESS_KEY,
              CF_ACCOUNT_ID: process.env.S_CF_ACCOUNT_ID,
              MENTRA_API_KEY: process.env.S_MENTRA_API_KEY,
              WORKER_URL: process.env.S_WORKER_URL,
              AI_GATEWAY_API_KEY: process.env.S_AI_GATEWAY_API_KEY,
              AI_GATEWAY_BASE_URL: process.env.S_AI_GATEWAY_BASE_URL,
              AI_GATEWAY_MODEL: process.env.S_AI_GATEWAY_MODEL,
            };
            const filtered = {};
            for (const [k, v] of Object.entries(s)) { if (v) filtered[k] = v; }
            process.stdout.write(JSON.stringify(filtered));
          ' | npx wrangler secret bulk
        env:
          S_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          S_MOLTBOT_GATEWAY_TOKEN: ${{ secrets.MOLTBOT_GATEWAY_TOKEN }}
          S_CF_ACCESS_TEAM_DOMAIN: ${{ secrets.CF_ACCESS_TEAM_DOMAIN }}
          S_CF_ACCESS_AUD: ${{ secrets.CF_ACCESS_AUD }}
          S_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          S_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          S_CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          S_MENTRA_API_KEY: ${{ secrets.MENTRA_API_KEY }}
          S_WORKER_URL: ${{ secrets.WORKER_URL }}
          S_AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          S_AI_GATEWAY_BASE_URL: ${{ secrets.AI_GATEWAY_BASE_URL }}
          S_AI_GATEWAY_MODEL: ${{ secrets.AI_GATEWAY_MODEL }}

  preview:
    if: github.event_name == 'pull_request'
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload preview version
        uses: cloudflare/wrangler-action@v3
        with:
          command: versions upload
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
