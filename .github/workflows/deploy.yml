name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          command: deploy
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload secrets via API
        run: |
          curl -sS -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/workers/scripts/moltbot-sandbox/script-settings" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "bindings": [
                {"type":"secret_text","name":"ANTHROPIC_API_KEY","text":"${{ secrets.ANTHROPIC_API_KEY }}"},
                {"type":"secret_text","name":"MOLTBOT_GATEWAY_TOKEN","text":"${{ secrets.MOLTBOT_GATEWAY_TOKEN }}"},
                {"type":"secret_text","name":"CF_ACCESS_TEAM_DOMAIN","text":"${{ secrets.CF_ACCESS_TEAM_DOMAIN }}"},
                {"type":"secret_text","name":"CF_ACCESS_AUD","text":"${{ secrets.CF_ACCESS_AUD }}"},
                {"type":"secret_text","name":"R2_ACCESS_KEY_ID","text":"${{ secrets.R2_ACCESS_KEY_ID }}"},
                {"type":"secret_text","name":"R2_SECRET_ACCESS_KEY","text":"${{ secrets.R2_SECRET_ACCESS_KEY }}"},
                {"type":"secret_text","name":"CF_ACCOUNT_ID","text":"${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"},
                {"type":"secret_text","name":"MENTRA_API_KEY","text":"${{ secrets.MENTRA_API_KEY }}"},
                {"type":"secret_text","name":"WORKER_URL","text":"${{ secrets.WORKER_URL }}"},
                {"type":"secret_text","name":"AI_GATEWAY_API_KEY","text":"${{ secrets.AI_GATEWAY_API_KEY }}"},
                {"type":"secret_text","name":"AI_GATEWAY_BASE_URL","text":"${{ secrets.AI_GATEWAY_BASE_URL }}"},
                {"type":"secret_text","name":"AI_GATEWAY_MODEL","text":"${{ secrets.AI_GATEWAY_MODEL }}"}
              ]
            }' | jq -e '.success' || echo "Warning: secrets upload returned non-success (secrets may already be set)"

  preview:
    if: github.event_name == 'pull_request'
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload preview version
        uses: cloudflare/wrangler-action@v3
        with:
          command: versions upload
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
