name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          command: deploy
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload secrets
        run: |
          echo '${{ toJSON(secrets) }}' | node -e '
            const s = JSON.parse(require("fs").readFileSync(0,"utf8"));
            const keep = [
              "ANTHROPIC_API_KEY","MOLTBOT_GATEWAY_TOKEN","CF_ACCESS_TEAM_DOMAIN",
              "CF_ACCESS_AUD","R2_ACCESS_KEY_ID","R2_SECRET_ACCESS_KEY",
              "CF_ACCOUNT_ID","MENTRA_API_KEY","WORKER_URL",
              "AI_GATEWAY_API_KEY","AI_GATEWAY_BASE_URL","AI_GATEWAY_MODEL"
            ];
            const out = {};
            for (const k of keep) if (s[k]) out[k] = s[k];
            // CF_ACCOUNT_ID comes from CLOUDFLARE_ACCOUNT_ID secret
            if (s.CLOUDFLARE_ACCOUNT_ID) out.CF_ACCOUNT_ID = s.CLOUDFLARE_ACCOUNT_ID;
            process.stdout.write(JSON.stringify(out));
          ' | npx wrangler secret:bulk
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  preview:
    if: github.event_name == 'pull_request'
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload preview version
        uses: cloudflare/wrangler-action@v3
        with:
          command: versions upload
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
